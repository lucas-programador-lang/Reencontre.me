<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reencontre.me | Achados e Perdidos da Comunidade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .card-item:hover { transform: translateY(-5px); transition: all 0.3s; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <nav class="bg-blue-600 text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black italic tracking-tighter">REENCONTRE.ME</h1>
            <button onclick="abrirModal()" class="bg-white text-blue-600 px-4 py-2 rounded-full font-bold hover:bg-blue-50 transition shadow-lg">
                <i class="fas fa-plus mr-2"></i>REPORTAR ALGO
            </button>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <div class="flex flex-col md:flex-row gap-4 mb-10">
            <input type="text" id="busca" placeholder="O que você perdeu? (ex: Chave, Cachorro, Carteira)" 
                   class="flex-1 p-4 rounded-xl border-none shadow-sm focus:ring-2 focus:ring-blue-400 outline-none">
            <select id="filtro-tipo" class="p-4 rounded-xl border-none shadow-sm bg-white outline-none">
                <option value="todos">Todos</option>
                <option value="perdido">Perdidos</option>
                <option value="achado">Achados</option>
            </select>
        </div>

        <div id="grid-itens" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <div id="modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-[100]">
        <div class="bg-white w-full max-w-lg rounded-2xl p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">Novo Registro</h2>
                <button onclick="fecharModal()" class="text-gray-400 hover:text-red-500"><i class="fas fa-times fa-lg"></i></button>
            </div>
            
            <form id="form-item" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <button type="button" onclick="setTipo('perdido')" id="btn-perdido" class="p-3 rounded-lg border-2 border-red-500 text-red-500 font-bold hover:bg-red-50">PERDI</button>
                    <button type="button" onclick="setTipo('achado')" id="btn-achado" class="p-3 rounded-lg border-2 border-green-500 text-green-500 font-bold hover:bg-green-50">ACHEI</button>
                </div>
                <input type="hidden" id="input-tipo" value="perdido">
                
                <input type="text" id="item-nome" placeholder="Nome do objeto/pet" class="w-full p-3 border rounded-lg outline-none focus:border-blue-500" required>
                <input type="text" id="item-local" placeholder="Bairro ou Local de referência" class="w-full p-3 border rounded-lg outline-none focus:border-blue-500" required>
                <textarea id="item-desc" placeholder="Detalhes (cor, marca, características únicas)" class="w-full p-3 border rounded-lg h-24 outline-none focus:border-blue-500" required></textarea>
                <input type="tel" id="item-contato" placeholder="Seu WhatsApp (00) 00000-0000" class="w-full p-3 border rounded-lg outline-none focus:border-blue-500" required>
                
                <button type="submit" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold hover:bg-blue-700 transition">PUBLICAR NO MURAL</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
